<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barebones CLJS</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #18202d;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      .app-shell {
        width: min(92vw, 560px);
        padding: 32px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 40px rgb(24 32 45 / 0.12);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #496179;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #435066;
        line-height: 1.6;
      }

      code {
        font-size: 0.95em;
      }

      button {
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 6px;
        background: #1d6f5f;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #16584c;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="/js/main.js"></script>
  </body>
</html>
